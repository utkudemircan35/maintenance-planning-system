<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PM-DSS | Giriş</title>
  <meta name="description" content="Production Intensity-Based Intelligent Machine Maintenance Planning Information System">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card fade-in">
      <div class="login-logo">
        <div class="icon-box"><i class="fas fa-industry"></i></div>
        <h1>PM-DSS</h1>
      </div>
      <p class="login-subtitle">Üretim Yoğunluğuna Dayalı Akıllı Makine Bakım Planlama Sistemi</p>

      <form id="loginForm" class="form-modern">
        <div id="loginError" class="alert alert-danger d-none" style="font-size:13px;border-radius:10px;"></div>

        <div class="mb-3">
          <label class="form-label">E-posta Adresi</label>
          <div class="input-group">
            <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1.5px solid #e2e8f0;border-right:none;background:#f8fafc;"><i class="fas fa-envelope" style="color:#94a3b8;font-size:13px;"></i></span>
            <input type="email" class="form-control" id="loginEmail" placeholder="ornek@pmdss.com" required style="border-left:none;border-radius:0 10px 10px 0;">
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label">Şifre</label>
          <div class="input-group">
            <span class="input-group-text" style="border-radius:10px 0 0 10px;border:1.5px solid #e2e8f0;border-right:none;background:#f8fafc;"><i class="fas fa-lock" style="color:#94a3b8;font-size:13px;"></i></span>
            <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required style="border-left:none;border-radius:0 10px 10px 0;">
          </div>
        </div>

        <button type="submit" class="btn btn-login">
          <i class="fas fa-sign-in-alt me-2"></i>Giriş Yap
        </button>
      </form>

      <div class="demo-info">
        <h6><i class="fas fa-info-circle me-1"></i>Demo Hesapları</h6>
        <div style="display:grid;gap:3px;">
          <div><strong>Admin:</strong> <code>admin@pmdss.com</code> / <code>admin123</code></div>
          <div><strong>Üretim Md.:</strong> <code>uretim@pmdss.com</code> / <code>uretim123</code></div>
          <div><strong>Bakım Md.:</strong> <code>bakim@pmdss.com</code> / <code>bakim123</code></div>
          <div><strong>Teknisyen:</strong> <code>teknisyen@pmdss.com</code> / <code>teknisyen123</code></div>
          <div><strong>Üst Yönetim:</strong> <code>yonetim@pmdss.com</code> / <code>yonetim123</code></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script>
    loadData().then(() => {
      // Check if already logged in
      const session = sessionStorage.getItem('pmdss_user');
      if (session) window.location.href = 'dashboard.html';

      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errEl = document.getElementById('loginError');

        const user = getUserByEmail(email);
        if (!user || user.Password !== password) {
          errEl.classList.remove('d-none');
          errEl.textContent = 'Geçersiz e-posta veya şifre.';
          return;
        }
        if (user.AccountStatus !== 'Active') {
          errEl.classList.remove('d-none');
          errEl.textContent = 'Bu hesap aktif değil.';
          return;
        }
        sessionStorage.setItem('pmdss_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      });
    });
  </script>
</body>
</html>
